<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل اشتراک - سرویس شما</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Vazirmatn Font -->
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <!-- QRCode.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background: linear-gradient(145deg, #0a0e1a 0%, #141b2d 40%, #1a1f35 70%, #0d1225 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background orbs */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, rgba(168, 85, 247, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 80%, rgba(236, 72, 153, 0.05) 0%, transparent 50%);
            animation: rotateOrbs 120s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes rotateOrbs {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .container-main {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }

        /* Glassmorphism Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.5);
        }

        /* Header avatar glow */
        .avatar-glow {
            position: relative;
        }

        .avatar-glow::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 16px;
            background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            opacity: 0.3;
            filter: blur(8px);
            animation: pulseGlow 3s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
        }

        .avatar-inner {
            position: relative;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 16px;
            padding: 14px;
        }

        /* Status badge pulse */
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-left: 6px;
        }

        .status-dot.active {
            background: #34d399;
            box-shadow: 0 0 12px rgba(52, 211, 153, 0.5);
            animation: dotPulse 2s ease-in-out infinite;
        }

        .status-dot.loading {
            background: #fbbf24;
            box-shadow: 0 0 12px rgba(251, 191, 36, 0.4);
            animation: dotPulse 1.2s ease-in-out infinite;
        }

        .status-dot.error {
            background: #f87171;
            box-shadow: 0 0 12px rgba(248, 113, 113, 0.4);
        }

        @keyframes dotPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        /* Progress bar */
        .progress-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 999px;
            height: 8px;
            padding: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 999px;
            transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(90deg, #6366f1, #a855f7);
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* Config cards */
        .config-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 14px 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: default;
            position: relative;
            overflow: hidden;
        }

        .config-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.03), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .config-card:hover {
            border-color: rgba(99, 102, 241, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }

        .config-card:hover::before {
            opacity: 1;
        }

        .config-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .btn-icon {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.04);
            border: none;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .btn-icon:hover {
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
            transform: scale(1.05);
        }

        .btn-icon.copy-all {
            background: rgba(99, 102, 241, 0.08);
            color: #818cf8;
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 12px;
            gap: 6px;
            display: flex;
            align-items: center;
            transition: all 0.25s ease;
        }

        .btn-icon.copy-all:hover {
            background: rgba(99, 102, 241, 0.2);
            transform: scale(1.02);
        }

        /* QR Box */
        .qr-box {
            display: none;
            justify-content: center;
            padding-top: 14px;
            margin-top: 14px;
            border-top: 1px dashed rgba(255, 255, 255, 0.06);
        }

        .qr-box.show {
            display: flex;
            animation: fadeSlideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeSlideIn {
            0% { opacity: 0; transform: translateY(-8px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .qr-wrapper {
            background: white;
            padding: 12px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }

        /* Protocol bars */
        .proto-bar-track {
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 999px;
            overflow: hidden;
            flex: 1;
        }

        .proto-bar-fill {
            height: 100%;
            border-radius: 999px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 999px;
        }

        /* Skeleton loading */
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.02) 25%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0.02) 75%);
            background-size: 200% 100%;
            animation: skeletonShimmer 1.5s infinite;
            border-radius: 8px;
        }

        @keyframes skeletonShimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(16, 185, 129, 0.15);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 12px 24px;
            border-radius: 16px;
            color: #34d399;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 999;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast i {
            font-size: 16px;
        }

        /* Utility */
        .text-gradient {
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .text-gradient-pink {
            background: linear-gradient(135deg, #f472b6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .border-gradient {
            border-image: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(168, 85, 247, 0.2)) 1;
        }

        /* Responsive */
        @media (max-width: 480px) {
            body { padding: 12px; }
            .glass-card { padding: 16px !important; }
            .config-card { padding: 12px 14px; }
        }
    </style>
</head>
<body>

    <div class="container-main">
        <!-- ===== TOAST ===== -->
        <div id="toast" class="toast">
            <i class="fas fa-check-circle"></i>
            <span id="toastMessage">کپی شد!</span>
        </div>

        <!-- ===== HEADER CARD ===== -->
        <div class="glass-card rounded-2xl p-6 text-center mb-5 relative overflow-hidden">
            <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500"></div>

            <div class="avatar-glow inline-block mb-3">
                <div class="avatar-inner">
                    <i class="fas fa-shield-halved text-2xl text-indigo-400"></i>
                </div>
            </div>

            <h1 class="text-xl font-bold text-white mb-1" id="userTitle">اکانت کاربر محترم</h1>
            <p class="text-xs text-slate-400 font-mono tracking-wider" id="statusMsg">در حال دریافت اطلاعات...</p>

            <div class="flex items-center justify-center gap-2 mt-3">
                <span class="status-dot loading" id="statusDot"></span>
                <span class="text-xs text-slate-400" id="statusBadgeText">در حال بررسی</span>
            </div>
        </div>

        <!-- ===== USAGE CARD ===== -->
        <div class="glass-card rounded-2xl p-5 mb-5 hidden" id="usageCard">
            <div class="flex justify-between items-center text-sm mb-3">
                <span class="text-slate-400"><i class="fas fa-chart-pie ml-2 text-indigo-400"></i>حجم مصرف شده</span>
                <span class="font-bold text-white" id="usageHeadline">-</span>
            </div>

            <div class="progress-track">
                <div class="progress-fill" id="usageFill" style="width: 0%"></div>
            </div>

            <div class="grid grid-cols-2 gap-3 mt-4">
                <div class="bg-white/5 rounded-xl p-3 border border-white/5">
                    <div class="text-xs text-slate-400 mb-1"><i class="fas fa-calendar-days ml-1.5 text-purple-400"></i>تمدید</div>
                    <div class="text-sm font-semibold text-white" id="renewDate">-</div>
                </div>
                <div class="bg-white/5 rounded-xl p-3 border border-white/5">
                    <div class="text-xs text-slate-400 mb-1"><i class="fas fa-hourglass-half ml-1.5 text-pink-400"></i>باقی‌مانده</div>
                    <div class="text-sm font-semibold text-white" id="daysLeft">-</div>
                </div>
            </div>
        </div>

        <!-- ===== PROTOCOL BREAKDOWN ===== -->
        <div class="glass-card rounded-2xl p-5 mb-5 hidden" id="protoCard">
            <div class="text-sm text-slate-400 mb-3"><i class="fas fa-shuffle ml-2 text-indigo-400"></i>پروتکل‌ها</div>
            <div id="protoBars" class="space-y-2"></div>
        </div>

        <!-- ===== CONFIGS LIST ===== -->
        <div class="space-y-3 hidden" id="listWrap">
            <div class="flex items-center justify-between px-1">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider">
                    <i class="fas fa-link ml-2 text-indigo-400"></i>
                    کانفیگ‌ها <span class="text-slate-500 font-mono" id="countBadge">(0)</span>
                </h2>
                <button id="copyAllBtn" class="btn-icon copy-all">
                    <i class="fas fa-copy"></i>
                    کپی همه
                </button>
            </div>
            <div id="list"></div>
        </div>

        <p class="text-center text-sm text-slate-500 hidden mt-4" id="emptyMsg">
            <i class="fas fa-exclamation-circle ml-2"></i>
            کانفیگی یافت نشد
        </p>

        <!-- ===== FOOTER ===== -->
        <div class="text-center mt-6 pt-4 border-t border-white/5">
            <p class="text-xs text-slate-500">نیاز به پشتیبانی دارید؟</p>
            <a href="https://t.me/YourSupportGroup" target="_blank" class="inline-flex items-center gap-2 mt-2 px-4 py-2 rounded-xl bg-white/5 hover:bg-white/10 text-xs font-semibold text-indigo-400 transition-all duration-200 border border-white/5 hover:border-indigo-400/20">
                <i class="fab fa-telegram text-sm"></i>
                ارتباط در تلگرام
            </a>
        </div>
    </div>

    <script>
        // ============================================================
        //  ELEMENTS
        // ============================================================
        const userTitle      = document.getElementById('userTitle');
        const statusMsg      = document.getElementById('statusMsg');
        const statusDot      = document.getElementById('statusDot');
        const statusBadgeText= document.getElementById('statusBadgeText');
        const usageCard      = document.getElementById('usageCard');
        const usageFill      = document.getElementById('usageFill');
        const usageHeadline  = document.getElementById('usageHeadline');
        const renewDate      = document.getElementById('renewDate');
        const daysLeft       = document.getElementById('daysLeft');
        const protoCard      = document.getElementById('protoCard');
        const protoBars      = document.getElementById('protoBars');
        const listWrap       = document.getElementById('listWrap');
        const listEl         = document.getElementById('list');
        const countBadge     = document.getElementById('countBadge');
        const emptyMsg       = document.getElementById('emptyMsg');
        const copyAllBtn     = document.getElementById('copyAllBtn');
        const toast          = document.getElementById('toast');
        const toastMessage   = document.getElementById('toastMessage');

        // ============================================================
        //  HELPERS
        // ============================================================
        function showToast(text) {
            toastMessage.textContent = text;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function setStatus(state, text) {
            const dotMap = {
                loading: ['loading', 'در حال بررسی'],
                active:  ['active', 'فعال'],
                error:   ['error', 'خطا']
            };
            const [dotClass, label] = dotMap[state] || dotMap.loading;
            statusDot.className = `status-dot ${dotClass}`;
            statusBadgeText.textContent = label;
        }

        function setStatusMsg(text) {
            statusMsg.textContent = text;
        }

        function b64decode(str) {
            str = str.trim().replace(/-/g, '+').replace(/_/g, '/');
            while (str.length % 4) str += '=';
            try { return decodeURIComponent(escape(atob(str))); }
            catch(e) { try { return atob(str); } catch(e2) { return ''; } }
        }

        function fmtBytes(bytes) {
            if (!isFinite(bytes) || bytes < 0) return '-';
            const units = ['B', 'KB', 'MB', 'GB', 'TB'];
            let i = 0, v = bytes;
            while (v >= 1024 && i < units.length-1) { v /= 1024; i++; }
            return v.toFixed(v >= 10 ? 0 : 1) + ' ' + units[i];
        }

        const persianDigits = ['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹'];
        function toFa(n) {
            return String(n).replace(/[0-9]/g, d => persianDigits[d]);
        }

        function toJalali(gy, gm, gd) {
            const g_d_m = [0,31,59,90,120,151,181,212,243,273,304,334];
            let jy;
            if (gy <= 1600) { jy = 0; gy -= 621; } else { jy = 979; gy -= 1600; }
            const gy2 = (gm > 2) ? (gy + 1) : gy;
            let days = (365 * gy) + Math.floor((gy2 + 3) / 4) - Math.floor((gy2 + 99) / 100) + Math.floor((gy2 + 399) / 400) - 80 + gd + g_d_m[gm-1];
            jy += 33 * Math.floor(days / 12053);
            days %= 12053;
            jy += 4 * Math.floor(days / 1461);
            days %= 1461;
            if (days > 365) { jy += Math.floor((days - 1) / 365); days = (days - 1) % 365; }
            const jm = (days < 186) ? 1 + Math.floor(days / 31) : 7 + Math.floor((days - 186) / 30);
            const jd = 1 + ((days < 186) ? (days % 31) : ((days - 186) % 30));
            return [jy, jm, jd];
        }

        function fmtJalaliDate(unixSeconds) {
            const d = new Date(unixSeconds * 1000);
            const [jy, jm, jd] = toJalali(d.getFullYear(), d.getMonth() + 1, d.getDate());
            return toFa(`${jy}/${String(jm).padStart(2,'0')}/${String(jd).padStart(2,'0')}`);
        }

        // ============================================================
        //  USAGE
        // ============================================================
        function renderUsageInfo(headerStr) {
            if (!headerStr) { usageCard.classList.add('hidden'); return; }
            const parts = {};
            headerStr.split(';').forEach(p => {
                const [k, v] = p.trim().split('=');
                if (k && v !== undefined) parts[k.trim()] = parseInt(v.trim(), 10);
            });
            const used = (parts.upload || 0) + (parts.download || 0);
            const total = parts.total || 0;
            const expire = parts.expire || 0;

            usageCard.classList.remove('hidden');

            if (total > 0) {
                const pct = Math.min(100, (used / total) * 100);
                usageFill.style.width = pct + '%';
                usageFill.style.background = pct > 90 ?
                    'linear-gradient(90deg, #ef4444, #dc2626)' :
                    pct > 70 ?
                    'linear-gradient(90deg, #f59e0b, #d97706)' :
                    'linear-gradient(90deg, #6366f1, #a855f7)';
                usageHeadline.innerHTML = `${fmtBytes(used)} <span class="text-xs text-slate-400">از ${fmtBytes(total)}</span>`;
            } else if (used > 0) {
                usageFill.style.width = '100%';
                usageFill.style.background = 'linear-gradient(90deg, #10b981, #34d399)';
                usageHeadline.innerHTML = `${fmtBytes(used)} <span class="text-xs text-slate-400">(نامحدود)</span>`;
            } else {
                usageFill.style.width = '0%';
                usageHeadline.textContent = 'بدون مصرف';
            }

            if (expire > 0) {
                const now = Math.floor(Date.now() / 1000);
                const days = Math.max(0, Math.ceil((expire - now) / 86400));
                daysLeft.textContent = toFa(days) + ' روز';
                renewDate.textContent = fmtJalaliDate(expire);
            } else {
                daysLeft.textContent = 'نامحدود';
                renewDate.textContent = 'نامحدود';
            }
        }

        // ============================================================
        //  PROTOCOL
        // ============================================================
        function detectProto(uri) {
            if (uri.startsWith('vless://'))   return { key: 'vless', label: 'VLESS', icon: 'fa-bolt', color: '#818cf8', bg: 'rgba(99,102,241,0.12)', text: 'text-indigo-400' };
            if (uri.startsWith('vmess://'))   return { key: 'vmess', label: 'VMESS', icon: 'fa-shuffle', color: '#c084fc', bg: 'rgba(168,85,247,0.12)', text: 'text-purple-400' };
            if (uri.startsWith('trojan://'))  return { key: 'trojan', label: 'TROJAN', icon: 'fa-mask', color: '#f472b6', bg: 'rgba(236,72,153,0.12)', text: 'text-pink-400' };
            if (uri.startsWith('ss://'))      return { key: 'ss', label: 'SS', icon: 'fa-lock', color: '#38bdf8', bg: 'rgba(56,189,248,0.12)', text: 'text-sky-400' };
            if (uri.startsWith('hysteria2://') || uri.startsWith('hy2://')) return { key: 'hy2', label: 'HYSTERIA2', icon: 'fa-cloud', color: '#34d399', bg: 'rgba(16,185,129,0.12)', text: 'text-emerald-400' };
            if (uri.startsWith('tuic://'))    return { key: 'tuic', label: 'TUIC', icon: 'fa-satellite-dish', color: '#fbbf24', bg: 'rgba(251,191,36,0.12)', text: 'text-amber-400' };
            return { key: 'other', label: 'UNKNOWN', icon: 'fa-link', color: '#94a3b8', bg: 'rgba(148,163,184,0.08)', text: 'text-slate-400' };
        }

        function parseEntry(uri) {
            const proto = detectProto(uri);
            let name = proto.label;
            let subtitle = '';
            try {
                if (proto.key === 'vmess') {
                    const json = JSON.parse(b64decode(uri.replace('vmess://','')));
                    name = json.ps || proto.label;
                    subtitle = `${json.add || '-'}:${json.port || '-'} · ${json.net || 'tcp'}`;
                } else {
                    const hashIdx = uri.indexOf('#');
                    if (hashIdx > -1) name = decodeURIComponent(uri.slice(hashIdx + 1)) || proto.label;
                    const body = uri.split('://')[1] || '';
                    const beforeHash = body.split('#')[0];
                    const [userAndHost, queryStr] = beforeHash.split('?');
                    const afterAt = userAndHost.includes('@') ? userAndHost.split('@')[1] : userAndHost;
                    const [host, port] = afterAt.split(':');
                    const qs = new URLSearchParams(queryStr || '');
                    subtitle = `${host || '-'}:${port || '-'} · ${qs.get('type') || 'tcp'}`;
                }
            } catch(e) {}
            return { uri, proto, name, subtitle };
        }

        // ============================================================
        //  RENDER
        // ============================================================
        function renderProtoBreakdown(entries) {
            const counts = {};
            entries.forEach(e => { counts[e.proto.key] = (counts[e.proto.key] || 0) + 1; });
            const keys = Object.keys(counts);
            protoBars.innerHTML = '';
            if (keys.length === 0) { protoCard.classList.add('hidden'); return; }
            protoCard.classList.remove('hidden');
            const max = Math.max(...Object.values(counts));
            keys.forEach(k => {
                const sample = entries.find(e => e.proto.key === k).proto;
                const row = document.createElement('div');
                row.className = 'flex items-center gap-3 text-xs';
                row.innerHTML = `
                    <span class="w-16 flex-shrink-0 font-semibold" style="color:${sample.color}">${sample.label}</span>
                    <div class="proto-bar-track">
                        <div class="proto-bar-fill" style="width:${(counts[k]/max)*100}%;background:${sample.color}"></div>
                    </div>
                    <span class="font-mono text-slate-500 w-5 text-left">${toFa(counts[k])}</span>
                `;
                protoBars.appendChild(row);
            });
        }

        function renderEntries(rawText) {
            listEl.innerHTML = '';
            const lines = rawText.split(/\r?\n/).map(l => l.trim()).filter(l => /^[a-z0-9]+:\/\//i.test(l));

            if (lines.length === 0) {
                listWrap.classList.add('hidden');
                emptyMsg.classList.remove('hidden');
                setStatus('error', 'کانفیگی یافت نشد');
                setStatusMsg('لینک اشتراک معتبر نیست');
                return;
            }

            emptyMsg.classList.add('hidden');
            listWrap.classList.remove('hidden');
            setStatus('active', 'سرویس فعال');
            setStatusMsg('اطلاعات اشتراک دریافت شد');

            const entries = lines.map(parseEntry);
            countBadge.textContent = `(${toFa(entries.length)})`;
            renderProtoBreakdown(entries);

            if (entries.length && entries[0].name) {
                userTitle.textContent = entries[0].name;
            }

            entries.forEach((entry, idx) => {
                const card = document.createElement('div');
                card.className = 'config-card';
                card.innerHTML = `
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3 min-w-0">
                            <div class="config-icon" style="background:${entry.proto.bg};color:${entry.proto.color}">
                                <i class="fas ${entry.proto.icon}"></i>
                            </div>
                            <div class="min-w-0">
                                <div class="text-sm font-semibold text-white truncate">${entry.name}</div>
                                <div class="text-xs text-slate-400 font-mono truncate">${entry.subtitle}</div>
                            </div>
                        </div>
                        <div class="flex items-center gap-1.5 flex-shrink-0">
                            <button class="btn-icon qr-toggle" data-idx="${idx}">
                                <i class="fas fa-qrcode"></i>
                            </button>
                            <button class="btn-icon copy-one" data-uri="${entry.uri.replace(/"/g, '&quot;')}">
                                <i class="fas fa-copy"></i>
                            </button>
                        </div>
                    </div>
                    <div class="qr-box" id="qr-box-${idx}">
                        <div class="qr-wrapper" id="qr-canvas-${idx}"></div>
                    </div>
                `;
                listEl.appendChild(card);

                // Copy one
                card.querySelector('.copy-one').addEventListener('click', function() {
                    const uri = this.dataset.uri;
                    navigator.clipboard.writeText(uri).then(() => showToast('لینک کپی شد'));
                });

                // QR toggle
                card.querySelector('.qr-toggle').addEventListener('click', function() {
                    const idx = this.dataset.idx;
                    const box = document.getElementById(`qr-box-${idx}`);
                    const showing = box.classList.contains('show');
                    box.classList.toggle('show');
                    if (!showing && document.getElementById(`qr-canvas-${idx}`).childElementCount === 0) {
                        new QRCode(document.getElementById(`qr-canvas-${idx}`), {
                            text: entries[idx].uri,
                            width: 160,
                            height: 160,
                            colorDark: '#0B0E13',
                            colorLight: '#ffffff'
                        });
                    }
                });
            });
        }

        // Copy all
        copyAllBtn.addEventListener('click', function() {
            if (window.__rawSub) {
                navigator.clipboard.writeText(window.__rawSub).then(() => showToast('همه کانفیگ‌ها کپی شد'));
            } else {
                showToast('متن موجود نیست');
            }
        });

        // ============================================================
        //  FETCH
        // ============================================================
        async function loadFromServer(idOrUrl) {
            let url = idOrUrl;
            if (!/^https?:\/\//i.test(idOrUrl)) {
                const cleanId = idOrUrl.replace(/^\/+/, '').replace(/^(sub|rawsub|view)\//, '');
                url = '/rawsub/' + cleanId;
            }
            const res = await fetch(url);
            if (!res.ok) throw new Error('fetch failed');
            renderUsageInfo(res.headers.get('subscription-userinfo'));
            const raw = await res.text();
            let decoded = raw;
            if (!/:\/\//.test(raw)) {
                decoded = b64decode(raw);
            }
            window.__rawSub = decoded;
            renderEntries(decoded);
        }

        // ============================================================
        //  INIT
        // ============================================================
        (function init() {
            const params = new URLSearchParams(window.location.search);
            let presetSub = params.get('sub') || params.get('id');
            if (!presetSub) {
                const m = window.location.pathname.match(/\/sub\/([^\/?#]+)/);
                if (m) presetSub = m[1];
            }
            if (presetSub) {
                setStatus('loading', 'در حال دریافت');
                setStatusMsg('در حال دریافت اطلاعات اشتراک...');
                loadFromServer(presetSub).catch(() => {
                    setStatus('error', 'دریافت ناموفق');
                    setStatusMsg('خطا در دریافت اطلاعات. لطفاً دوباره تلاش کنید.');
                });
            } else {
                setStatus('error', 'لینک نامعتبر');
                setStatusMsg('شناسه اشتراک در لینک یافت نشد');
            }
        })();
    </script>

</body>
</html>
